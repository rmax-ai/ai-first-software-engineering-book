<div class="md-copyright">
  {% if config.copyright %}
    <div class="md-copyright__highlight">
      {{ config.copyright }}
    </div>
  {% endif %}
  {% if not config.extra.generator == false %}
    Made with
    <a href="https://squidfunk.github.io/mkdocs-material/" target="_blank" rel="noopener">
      Material for MkDocs
    </a>
  {% endif %}
  <div class="build-timestamp" style="margin-top: 0.5em; font-size: 0.8em;">
    Last built: {{ build_date_utc.strftime('%Y-%m-%d %H:%M:%S UTC') }}
  </div>
</div>
